events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS resolver — needed to re-resolve the `app` service
    # name into all replica IPs at runtime (Compose's `deploy.replicas`
    # creates multiple containers behind one DNS name).
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream hostname_app {
        server app:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://hostname_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
